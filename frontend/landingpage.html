<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/landingpage.css">
    
    <title>EcoCart, Shop Eco-Friendly!</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
      integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo-container">
      <img src="./assets/Poppins-removebg-preview.png" alt="EcoCart Logo" class="logo-image">
      </div>
      <div class="search-bar">
        <input type="text" placeholder="Search for products...">
      </div>
      <nav class="nav-links">
        <a href="./landingpage.html" class="nav-link">HOME</a>
        <div class="dropdown">
          <a class="dropbtn">CATEGORIES</a>
          <div class="dropdown-content">
            <a href="YOUR_ESSENTIALS_URL_HERE">Essentials</a>
            <a href="YOUR_CLOTHING_URL_HERE">Clothing</a>
            <a href="YOUR_CUTLERY_URL_HERE">Cutlery</a>
          </div>
        </div>
      </nav>
      <nav class="icons">
        <a href="#" class="cart-icon"><i class="fa-solid fa-cart-shopping"></i></a>
        <div class="user-dropdown">
          <a href="#" class="user-icon"><i class="fa-solid fa-circle-user"></i></i></a>
          <div class="user-dropdown-content">
            <a href="YOUR_PROFILE_URL_HERE">Profile</a>
            <a href="YOUR_ORDERS_URL_HERE">Orders</a>
            <a href="YOUR_LOGOUT_URL_HERE">Logout</a>
          </div>
        </div>
      </nav>
    </nav>
  </header>
  
  <section class="banner">
    <img src="./assets/banner.png" alt="ecocart-banner" class="banner-image">
  </section>
  
  <section class="features">
    <img src="./assets/features1.png" alt="Feature 1" class="feature-image">
    <img src="./assets/features2.png" alt="Feature 2" class="feature-image">
    <img src="./assets/features3.png" alt="Feature 3" class="feature-image">
    <img src="./assets/features4.png" alt="Feature 4" class="feature-image">
  </section>
  
  <section class="products-section">
    <h2>Shop Through Varities of Eco-Friendly Products</h2>
    <div id="products-container" class="products-grid"></div>
  </section>

  <!-- Product Details Modal -->
  <div class="modal fade" id="productDetailsModal" tabindex="-1" role="dialog" aria-labelledby="productDetailsModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg" role="document">
          <div class="modal-content">
              <div class="modal-header">
                  <h5 class="modal-title" id="productDetailsModalLabel">Product Details</h5>
                  <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                      <span aria-hidden="true">&times;</span>
                  </button>
              </div>
              <div class="modal-body">
                  <div class="row">
                      <!-- Product Image Carousel -->
                      <div class="col-md-6">
                          <div id="productCarousel" class="carousel slide" data-ride="carousel">
                              <ol class="carousel-indicators">
                                  <!-- Indicators will be dynamically generated -->
                              </ol>
                              <div class="carousel-inner">
                                  <!-- Carousel items will be dynamically generated -->
                              </div>
                              <a class="carousel-control-prev" href="#productCarousel" role="button" data-slide="prev">
                                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                  <span class="sr-only">Previous</span>
                              </a>
                              <a class="carousel-control-next" href="#productCarousel" role="button" data-slide="next">
                                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                  <span class="sr-only">Next</span>
                              </a>
                          </div>
                      </div>
                      
                      <!-- Product Details -->
                      <div class="col-md-6">
                          <div class="product-details">
                              <h4 id="productName" class="mb-3">Product Name</h4>
                              
                              <div class="mb-3">
                                  <strong>Description:</strong>
                                  <p id="productDescription" class="text-muted">Product description will appear here...</p>
                              </div>
                              
                              <div class="row mb-3">
                                  <div class="col-sm-6">
                                      <strong>Price:</strong>
                                      <p id="productPrice" class="text-success font-weight-bold">₱0.00</p>
                                  </div>
                                  <div class="col-sm-6">
                                      <strong>Stock:</strong>
                                      <p id="productStocks" class="text-info">0</p>
                                  </div>
                              </div>
                              
                              <div class="mb-3">
                                  <strong>Category:</strong>
                                  <p id="productCategory" class="text-muted">Category</p>
                              </div>
                              
                              <!-- Action Buttons -->
                              <div class="mt-4">
                                  <button type="button" id="buyNowBtn" class="btn btn-success btn-lg mr-2" style="min-width: 120px;">
                                      <i class="fas fa-shopping-bag"></i> Buy Now
                                  </button>
                                  <button type="button" id="addToCartBtn" class="btn btn-primary btn-lg" style="min-width: 120px;">
                                      <i class="fas fa-shopping-cart"></i> Add to Cart
                                  </button>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
              <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
              </div>
          </div>
      </div>
  </div>

  <!-- jQuery and Bootstrap JS -->
  <script
    src="https://code.jquery.com/jquery-3.6.4.min.js"
    integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8="
    crossorigin="anonymous"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
    integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
    crossorigin="anonymous"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
    integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
    crossorigin="anonymous"
  ></script>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
    integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>

  <script src="./js/product.js"></script>

  <script>
    // User Options @ Hover
    const userIcon = document.querySelector('.user-icon');
    const userDropdownContent = document.querySelector('.user-dropdown-content');

    userIcon.addEventListener('click', (e) => {
      e.preventDefault();
      userDropdownContent.classList.toggle('show');
    });

    // Close dropdown when clicking outside
    window.addEventListener('click', function(e) {
      if (!e.target.closest('.user-dropdown')) {
        userDropdownContent.classList.remove('show');
      }
    });

    // Ensure Bootstrap components are properly initialized
    $(document).ready(function() {
      // Initialize tooltips if needed
      $('[data-toggle="tooltip"]').tooltip();
      
      // Ensure modal backdrop clicks work properly
      $(document).on('click', '.modal-backdrop', function() {
        $('.modal').modal('hide');
      });
    });
  </script>
</body>
</html>
